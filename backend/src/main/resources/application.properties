# 服务器配置
server.port=8084
spring.application.name=智学方舟

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/xueya?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# HikariCP 连接池配置
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1

# MyBatis-Plus 配置
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.type-aliases-package=com.xueya.entity

# JWT 配置
jwt.secret=xueya_assistant_secret_key_2024_secure_long_enough_for_jwt_hmac_sha_algorithm
jwt.expiration=86400000

# 日志配置
logging.level.com.xueya=info